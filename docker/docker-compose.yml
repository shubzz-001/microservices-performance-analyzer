version: '3.8'

services:
  backend:
    build: ../backend
    ports:
      - "8080:8080"
    environment:
      - db
      - ai

  ai :
    build: ../ai-service
    ports:
      - "8000:8000"
    
  frontend:
    build: ../frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
      
  db:
    image: postgres:18
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: analyzerDB
    ports:
      - "5432:5432"